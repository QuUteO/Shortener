version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shortener-postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: shortener-redis
    restart: always
    environment:
      REDIS_PASSWORD: user
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/var/lib/redis/data

volumes:
    pg_data:
    redis_data: